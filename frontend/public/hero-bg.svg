<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" role="img" aria-label="مسار جري وعدّاء">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0c07"/>
      <stop offset="60%" stop-color="#10160a"/>
      <stop offset="100%" stop-color="#1c270c"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2c3a0e"/>
      <stop offset="100%" stop-color="#090b06"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ccff00" stop-opacity="0.85"/>
      <stop offset="35%" stop-color="#a3d400" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#a3d400" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="vignette" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.15"/>
      <stop offset="55%" stop-color="#000000" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0a0c07" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Sky & ground -->
  <rect x="0" y="0" width="1600" height="372" fill="url(#sky)"/>
  <rect x="0" y="372" width="1600" height="528" fill="url(#ground)"/>

  <!-- Horizon sun glow -->
  <circle cx="800" cy="372" r="300" fill="url(#sun)"/>
  <ellipse cx="800" cy="372" rx="150" ry="14" fill="#ccff00" opacity="0.55" filter="url(#glow)"/>

  <!-- Perspective running track -->
  <polygon points="470,900 1130,900 838,378 762,378" fill="#cde85a" opacity="0.07"/>
  <polygon points="470,900 1130,900 838,378 762,378" fill="none" stroke="#ccff00" stroke-opacity="0.22" stroke-width="3"/>

  <!-- Lane dashes (center line, shrinking toward horizon) -->
  <g fill="#ccff00" opacity="0.5">
    <rect x="792" y="840" width="16" height="46" rx="4"/>
    <rect x="794" y="742" width="12" height="34" rx="3"/>
    <rect x="795" y="660" width="10" height="26" rx="3"/>
    <rect x="796" y="596" width="8"  height="20" rx="2"/>
    <rect x="797" y="546" width="6"  height="15" rx="2"/>
    <rect x="798" y="506" width="5"  height="11" rx="2"/>
    <rect x="798.5" y="474" width="4" height="8" rx="2"/>
  </g>

  <!-- Side lane separators -->
  <g stroke="#ccff00" stroke-opacity="0.12" stroke-width="2">
    <line x1="600" y1="900" x2="781" y2="378"/>
    <line x1="1000" y1="900" x2="819" y2="378"/>
  </g>

  <!-- Runner (brand neon green) with motion trail -->
  <g transform="translate(815,648) scale(2.7)">
    <!-- motion lines -->
    <g stroke="#ccff00" stroke-linecap="round" stroke-opacity="0.45">
      <line x1="-52" y1="-46" x2="-95" y2="-46" stroke-width="3"/>
      <line x1="-50" y1="-32" x2="-100" y2="-32" stroke-width="3"/>
      <line x1="-52" y1="-18" x2="-90" y2="-18" stroke-width="3"/>
    </g>
    <g fill="none" stroke="#ccff00" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
      <!-- torso -->
      <path d="M7,-54 L0,-16" stroke-width="15"/>
      <!-- front arm -->
      <path d="M6,-46 L24,-41 L30,-27" stroke-width="8"/>
      <!-- back arm -->
      <path d="M5,-46 L-14,-41 L-21,-51" stroke-width="8"/>
      <!-- front leg -->
      <path d="M1,-16 L21,-7 L17,18 L29,19" stroke-width="10"/>
      <!-- back leg -->
      <path d="M-1,-16 L-18,-3 L-34,9 L-43,13" stroke-width="10"/>
    </g>
    <!-- head -->
    <circle cx="9" cy="-62" r="9" fill="#ccff00" filter="url(#glow)"/>
  </g>

  <!-- Vignette for text contrast -->
  <rect x="0" y="0" width="1600" height="900" fill="url(#vignette)"/>
</svg>
